spring.application.name=DoAnMonHoc

# --- MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/attendance_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false


app.face-recognition.provider=${FACE_PROVIDER:cosine}
app.face-recognition.threshold=0.82
app.face-recognition.http.url=${FACE_MODEL_URL:}


app.face-embedding.provider=${FACE_EMBED_PROVIDER:http}
app.face-embedding.http.url=${FACE_EMBED_URL:http://127.0.0.1:8000/embed}
server.port=8080

app.security.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-at-least-32-bytes}
app.security.jwt.ttl-seconds=${APP_JWT_TTL_SECONDS:28800}


app.attendance.expected-start=08:00
app.attendance.late-grace-minutes=15
app.attendance.daily-target-hours=8

# Bật seed dữ liệu mẫu khi DB nghiệp vụ còn trống.
app.demo.seed=true


app.security.bootstrap-admin.employee-code=${BOOTSTRAP_ADMIN_CODE:admin}
app.security.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:admin123456}
app.security.bootstrap-admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:System Admin}
app.security.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@local}
